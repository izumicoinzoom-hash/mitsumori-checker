          { name: "スポイラー穴あけ加工", isKeyPoint: true, hint: "スポイラー取付用の穴あけ工賃", desc: "新品バックドアにスポイラー用の穴が開いていない場合、ドリルで穴をあける加工です。" },
          { name: "カメラ穴あけ加工", isKeyPoint: true, hint: "カメラ取付用の穴あけ工賃", desc: "新品のガーニッシュ等にバックカメラ用の穴をあける加工作業です。" },
          { name: "ドラレコ配線配管作業", isKeyPoint: true, hint: "ドライブレコーダーの配線引き直し・処理工賃", desc: "バックドアを交換する際、リアドラレコの配線を一度引き抜き、新しいドアへ通し直す作業です。" },
          { name: "シーリング（材料代・技術料）", isKeyPoint: true, hint: "パネル接合部のシーリング作業", desc: "新品バックドアのフチに防水ボンドを塗布する作業です。" },
          { name: "ヒンジ塗装", isKeyPoint: true, hint: "ヒンジ部の塗装", desc: "バックドアを支えるヒンジをボディ色に塗装する作業です。" },
          { name: "ナンバープレート脱着・再封印", isKeyPoint: true, hint: "ナンバーの脱着、および再封印手続き費用", desc: "普通車のリアナンバーを外す際、陸運局での「再封印」手続きとそれに伴う代行費用です。" }
        ]
      },
      "リヤバンパー": {
        items: [
          { name: "センサー", isKeyPoint: false, desc: "後方のソナーセンサー。傷の有無と個数を確認します。" },
          { name: "エアロ", isKeyPoint: false, desc: "リアアンダースポイラーなど。マフラー周辺の熱による変形や割れも確認します。" },
          { name: "マットガード", isKeyPoint: false, desc: "後輪後ろの泥除け。擦り傷やクリップの欠落を確認します。" },
          { name: "コーナーセンサー", isKeyPoint: false, desc: "バンパー角のセンサー。ぶつかった衝撃で内部に陥没していないか確認します。" },
          { name: "センサー穴あけ加工", isKeyPoint: true, hint: "各種センサー取付用の穴あけ工賃", desc: "新品バンパーにセンサー用の穴をあける加工作業です。" },
          { name: "マスキング（素地）", isKeyPoint: true, hint: "素地部分やマフラー周りのマスキング工賃", desc: "バンパー塗装時、素地部分やマフラーに塗料がつかないように覆い隠す作業です。" }
        ]
      }
    };

    const commonItems = {
      items: [
        { name: "スキャンツール（OBD診断機）接続・診断費用", isKeyPoint: true, hint: "入庫時・出庫時のシステム診断費用", desc: "最近の車は目に見えないコンピューターエラーが残るため、専用診断機で入庫時と出庫時にチェックする費用です。" },
        { name: "エーミング作業費用", isKeyPoint: true, hint: "バンパーやガラス、センサー脱着時の校正作業", desc: "センサーやカメラが付いた部品を脱着・交換した際、自動ブレーキ等が正しく作動するようターゲットを使って調整（校正）する作業です。" },
        { name: "試運転費用", isKeyPoint: true, hint: "足回り修理やシステム調整後の走行確認", desc: "足回りの修理やエーミング後、実際に道路を走って異音やシステムが正常に作動するか確認するテスト費用です。" },
        { name: "洗車・室内清掃費用", isKeyPoint: true, hint: "作業完了後の洗車および車内清掃", desc: "修理完了後、お客様に綺麗な状態で納車するための洗車と室内清掃にかかる費用です。" },
        { name: "廃棄物処理代（産廃代）", isKeyPoint: true, hint: "バンパー等、大型交換部品の処分費用", desc: "交換して不要になったバンパーや鉄板など、事業系廃棄物を適正に処分するための費用です。" },
        { name: "塗装ブース使用加算", isKeyPoint: true, hint: "塗装ブースを使用した場合の光熱費・設備加算", desc: "ゴミやホコリをシャットアウトし、熱をかけて塗料を乾燥させる専用の「塗装ブース」を使用する設備費用です。" },
        { name: "塗装範囲外ミスト養生作業", isKeyPoint: true, hint: "車体全体を塗料ミストから守るための全体養生費用", desc: "塗装中に塗料の粉（ミスト）が関係ない場所に飛んで付着しないよう、車体全体をビニール等で覆う作業です。" },
        { name: "基本準備時間", isKeyPoint: true, hint: "車両の搬入出、基本工具の準備・片付け（DAA基準等で計上可能）", desc: "作業前に車を所定の位置に移動させたり、工具を準備・片付けたりする「実作業以外に必ずかかる基本時間」です。" }
      ]
    };

    // --- メインアプリ ---
    function App() {
      const [selectedAreas, setSelectedAreas] = useState([]);
      const [checkedItems, setCheckedItems] = useState({});
      const [expandedHelp, setExpandedHelp] = useState({});
      const [areaPatterns, setAreaPatterns] = useState({});
      const [toastMessage, setToastMessage] = useState("");
      const [showConfirm, setShowConfirm] = useState(false);
      const [reportMeta, setReportMeta] = useState({
        受付番号: "",
        車両情報: "",
        担当者: ""
      });

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(""), 3000);
      };

      const handleToggleArea = (areaKey, label) => {
        setSelectedAreas(prev => {
          const exists = prev.find(p => p.label === label);
          if (exists) {
            return prev.filter(p => p.label !== label);
          } else {
            return [...prev, { areaKey, label }];
          }
        });
      };

      const handleToggleCheck = (itemKey) => {
        setCheckedItems(prev => {
          const newState = { ...prev };
          if (newState[itemKey]) {
            delete newState[itemKey];
          } else {
            newState[itemKey] = true;
          }
          return newState;
        });
      };

      const handleToggleHelp = (e, itemKey) => {
        e.stopPropagation(); 
        setExpandedHelp(prev => ({
          ...prev,
          [itemKey]: !prev[itemKey]
        }));
      };

      const handleResetClick = () => {
        setShowConfirm(true);
      };

      const executeReset = () => {
        setCheckedItems({});
        setSelectedAreas([]);
        setExpandedHelp({});
        setAreaPatterns({});
        setReportMeta({ 受付番号: "", 車両情報: "", 担当者: "" });
        setShowConfirm(false);
        showToast("リセットしました");
      };

      const handleMetaChange = (field, value) => {
        setReportMeta(prev => ({ ...prev, [field]: value }));
      };

      const handlePrint = () => {
        window.print();
      };

      const handlePatternChange = (label, pattern) => {
        setAreaPatterns(prev => ({ ...prev, [label]: pattern }));
      };

      const handleCopy = async () => {
        let text = "【見積もりチェックリスト】\n\n";
        let hasItems = false;
        const grouped = {};
        const metaText = Object.entries(reportMeta)
          .filter(([, value]) => value.trim() !== "")
          .map(([label, value]) => `${label}: ${value}`)
          .join("\n");
        
        Object.entries(checkedItems).forEach(([key, isChecked]) => {
          if (isChecked) {
            hasItems = true;
            const [label, itemName] = key.split('::');
            if (!grouped[label]) grouped[label] = [];
            grouped[label].push(itemName);
          }
        });

        if (!hasItems) {
          showToast("チェックされた項目がありません");
          return;
        }

        if (metaText) {
          text += `${metaText}\n\n`;
        }

        for (const [label, items] of Object.entries(grouped)) {
          const pattern = areaPatterns[label] || "未選択";
          text += `■ ${label}（${pattern}）\n`;
          items.forEach(item => {
            text += ` ・ ${item}\n`;
          });
          text += "\n";
        }

        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
          }
          showToast("クリップボードにコピーしました");
        } catch (err) {
          showToast("コピーに失敗しました");
        }
      };

      const renderPartButton = ({ label, partName, className = "" }) => {
        const isSelected = selectedAreas.some(p => p.label === label);
        const dataKey = partName === "共通項目" ? commonItems : partsData[partName];
        const items = dataKey?.items || [];
        const checkedCount = items.filter(item => checkedItems[`${label}::${item.name}`]).length;
        const isComplete = items.length > 0 && checkedCount === items.length;
        const hasSomeChecks = checkedCount > 0;

        return (
          <button
            key={label}
            onClick={() => handleToggleArea(partName, label)}
            className={`relative flex flex-col items-center justify-center p-2 text-sm font-bold border-2 transition-all duration-200 
              ${isSelected ? 'bg-blue-600 text-white border-blue-700 shadow-md transform scale-[1.02] z-10' : 'bg-white text-gray-700 border-gray-300 hover:bg-blue-50'} 
              ${className}`}
            style={{ minHeight: '3.5rem' }}
          >
            <span>{label}</span>
            {hasSomeChecks && !isComplete && (
              <span className="absolute -top-2 -right-2 bg-yellow-400 text-yellow-900 text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full shadow border border-white">
                {checkedCount}
              </span>
            )}
            {isComplete && (
              <span className="absolute -top-2 -right-2 bg-green-500 text-white w-5 h-5 flex items-center justify-center rounded-full shadow border border-white">
                <Check className="w-3 h-3 stroke-[3]" />
              </span>
            )}
          </button>
        );
      };

      return (
        <div className="min-h-screen pb-24 print:pb-0 print:bg-white">
          <style dangerouslySetInnerHTML={{__html: `
            .animate-fade-in { animation: fadeIn 0.2s ease-out; }
            .animate-fade-in-up { animation: fadeInUp 0.3s ease-out; }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
            @media print {
              @page { size: A4 portrait; margin: 10mm; }
              body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #fff !important; }
              .print-avoid-break { break-inside: avoid; page-break-inside: avoid; }
            }
          `}} />

          {/* ヘッダー (印刷時は非表示) */}
          <header className="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-30 print:hidden">
            <div className="max-w-5xl mx-auto flex items-center justify-between">
              <h1 className="text-lg md:text-xl font-bold flex items-center tracking-wide">
                <CheckSquare className="mr-2 text-blue-400 w-6 h-6" />
                シューリーズ 見積もり漏れチェッカー
              </h1>
              <button onClick={handleResetClick} className="text-xs md:text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded border border-slate-500 transition-colors">
                リセット
              </button>
            </div>
          </header>

          <main className="max-w-5xl mx-auto p-4 mt-4 print:hidden">
            <div className="mb-4 bg-blue-50 border border-blue-200 rounded-xl p-4">
              <h2 className="text-base font-bold text-blue-900 mb-2">使い方（公開利用向け）</h2>
              <p className="text-sm text-blue-800 leading-relaxed">
                1) 下の「受付情報」を入力 → 2) 車両図から損傷部位を選択 → 3) 各項目をチェック → 4) 右下の「印刷する」で出力。
              </p>
            </div>

            <div className="mb-6 bg-white border border-gray-200 rounded-2xl p-4 shadow-sm grid grid-cols-1 md:grid-cols-3 gap-3">
              <label className="text-sm">
                <span className="block text-gray-600 mb-1 font-medium">受付番号</span>
                <input value={reportMeta.受付番号} onChange={(e) => handleMetaChange("受付番号", e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="例: 2026-0012" />
              </label>
              <label className="text-sm">
                <span className="block text-gray-600 mb-1 font-medium">車両情報</span>
                <input value={reportMeta.車両情報} onChange={(e) => handleMetaChange("車両情報", e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="例: トヨタ プリウス" />
              </label>
              <label className="text-sm">
                <span className="block text-gray-600 mb-1 font-medium">担当者</span>
                <input value={reportMeta.担当者} onChange={(e) => handleMetaChange("担当者", e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="例: 清田" />
              </label>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            {/* 左カラム: 車両イラスト */}
            <div className="lg:col-span-5 lg:sticky lg:top-24">
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h2 className="text-center font-bold text-gray-700 mb-4 flex items-center justify-center">
                  <Car className="mr-2 w-5 h-5 text-gray-500" />
                  損傷部位を選択（複数可）
                </h2>
                
                <div className="flex flex-col items-center gap-1.5 w-full max-w-[320px] mx-auto bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">
                  {renderPartButton({ label: "フロントバンパー", partName: "フロントバンパー", className: "w-[85%] rounded-t-[2rem] rounded-b-md" })}
                  <div className="flex w-full gap-1.5 h-20">
                    {renderPartButton({ label: "左Fフェンダー", partName: "フロントフェンダー", className: "w-1/4 rounded-tl-2xl rounded-bl-sm" })}
                    {renderPartButton({ label: "ボンネット", partName: "ボンネット", className: "w-2/4 rounded-sm border-b-4 border-b-gray-400" })}
                    {renderPartButton({ label: "右Fフェンダー", partName: "フロントフェンダー", className: "w-1/4 rounded-tr-2xl rounded-br-sm" })}
                  </div>
                  <div className="flex w-full gap-1.5 h-20">
                    {renderPartButton({ label: "左Fドア", partName: "フロントドア", className: "w-1/4 rounded-sm" })}
                    {renderPartButton({ label: "ルーフ", partName: "ルーフ", className: "w-2/4 rounded-sm" })}
                    {renderPartButton({ label: "右Fドア", partName: "フロントドア", className: "w-1/4 rounded-sm" })}
                  </div>
                  <div className="flex w-full gap-1.5 h-20">
                    {renderPartButton({ label: "左Rドア", partName: "リアドア（スライドドア）", className: "w-1/4 rounded-sm" })}
                    <div className="w-2/4 bg-slate-200/60 flex items-center justify-center rounded-sm border border-slate-300 border-dashed">
                      <span className="text-slate-400 text-xs font-medium">室内/フロア</span>
                    </div>
                    {renderPartButton({ label: "右Rドア", partName: "リアドア（スライドドア）", className: "w-1/4 rounded-sm" })}
                  </div>
                  <div className="flex w-full gap-1.5 h-16">
                    {renderPartButton({ label: "左クォーター", partName: "クォーターパネル", className: "w-1/4 rounded-bl-2xl rounded-tl-sm" })}
                    {renderPartButton({ label: "バックドア", partName: "バックドア", className: "w-2/4 rounded-sm border-t-4 border-t-gray-400" })}
                    {renderPartButton({ label: "右クォーター", partName: "クォーターパネル", className: "w-1/4 rounded-br-2xl rounded-tr-sm" })}
                  </div>
                  {renderPartButton({ label: "リヤバンパー", partName: "リヤバンパー", className: "w-[85%] rounded-b-[2rem] rounded-t-md" })}
                </div>

                <div className="mt-6 w-full max-w-[320px] mx-auto">
                  {renderPartButton({ label: "共通・付帯作業 (必須)", partName: "共通項目", className: "w-full bg-indigo-50 border-indigo-300 text-indigo-800 rounded-xl py-3 hover:bg-indigo-100" })}
                </div>
              </div>
            </div>

            {/* 右カラム: チェックリスト群 */}
            <div className="lg:col-span-7">
              {selectedAreas.length === 0 ? (
                <div className="h-full min-h-[400px] flex flex-col items-center justify-center bg-white border border-gray-200 border-dashed rounded-2xl text-gray-400 p-6">
                  <Wrench className="w-12 h-12 mb-3 opacity-20" />
                  <p className="text-center font-medium leading-relaxed">
                    左のイラストから損傷部位を<br/>タップしてチェックを開始してください
                  </p>
                </div>
              ) : (
                <div className="space-y-6">
                  {selectedAreas.map((area) => {
                    const dataObj = area.areaKey === '共通項目' ? commonItems : partsData[area.areaKey];
                    const items = dataObj?.items || [];
                    
                    return (
                      <div key={area.label} className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden animate-fade-in">
                        <div className="bg-slate-50 border-b border-gray-200 p-4 flex justify-between items-center">
                          <div className="flex-1">
                            <h2 className="text-lg md:text-xl font-bold text-slate-800 flex items-center">
                              <ClipboardList className="mr-2 text-blue-600 w-6 h-6" />
                              {area.label}
                            </h2>
                            <div className="mt-2 flex flex-wrap gap-2 text-sm">
                              {["新品交換", "中古交換", "修理"].map((pattern) => (
                                <button
                                  key={pattern}
                                  type="button"
                                  aria-pressed={(areaPatterns[area.label] || "") === pattern}
                                  onClick={() => handlePatternChange(area.label, pattern)}
                                  className={`px-3 py-1.5 rounded-lg font-bold border transition-all duration-150 select-none
                                    ${(areaPatterns[area.label] || "") === pattern
                                      ? "bg-blue-600 text-white border-blue-700 border-b-2 shadow-inner"
                                      : "bg-white text-gray-700 border-gray-300 border-b-4 shadow-sm hover:bg-gray-50 active:translate-y-[1px] active:border-b-2"}
                                  `}
                                >
                                  {pattern}
                                </button>
                              ))}
                            </div>
                          </div>
                          <button onClick={() => handleToggleArea(area.areaKey, area.label)} className="text-gray-400 hover:text-red-500 bg-white border border-gray-200 rounded p-1 shadow-sm transition-colors ml-3">
                            <X className="w-5 h-5" />
                          </button>
                        </div>
                        
                        <div className="p-4 space-y-3">
                          {items.map((item, idx) => {
                            const itemKey = `${area.label}::${item.name}`;
                            const isChecked = !!checkedItems[itemKey];
                            const isHelpExpanded = !!expandedHelp[itemKey];
                            
                            return (
                              <div key={idx} onClick={() => handleToggleCheck(itemKey)} className={`flex items-start p-3.5 rounded-xl border-2 cursor-pointer transition-all duration-200 ${isChecked ? 'bg-blue-50/50 border-blue-400 shadow-sm' : 'bg-white border-gray-200 hover:border-blue-200 hover:bg-gray-50'} ${item.isKeyPoint && !isChecked ? 'border-yellow-300 bg-yellow-50/30' : ''}`}>
                                <div className="flex-shrink-0 mt-0.5">
                                  <div className={`w-6 h-6 rounded flex items-center justify-center border-2 transition-colors ${isChecked ? 'bg-blue-600 border-blue-600' : 'bg-white border-gray-300'}`}>
                                    {isChecked && <Check className="w-4 h-4 text-white stroke-[3]" />}
                                  </div>
                                </div>
                                <div className="ml-3 flex-1">
                                  <div className="flex justify-between items-center">
                                    <div className={`text-base font-bold transition-all ${isChecked ? 'text-blue-900 opacity-80' : 'text-gray-800'}`}>
                                      {item.name}
                                    </div>
                                    {item.desc && (
                                      <button onClick={(e) => handleToggleHelp(e, itemKey)} className={`p-1.5 rounded-full transition-colors flex-shrink-0 ml-2 ${isHelpExpanded ? 'bg-indigo-100 text-indigo-600' : 'text-gray-400 hover:bg-gray-100 hover:text-gray-600'}`}>
                                        <HelpCircle className="w-5 h-5" />
                                      </button>
                                    )}
                                  </div>

                                  {isHelpExpanded && item.desc && (
                                    <div className="mt-2.5 mb-1 p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-700 leading-relaxed flex items-start shadow-inner animate-fade-in" onClick={(e) => e.stopPropagation()}>
                                      <Info className="w-4 h-4 text-indigo-500 mr-2 flex-shrink-0 mt-0.5" />
                                      <div>{item.desc}</div>
                                    </div>
                                  )}
                                  
                                  {item.isKeyPoint && (
                                    <div className={`mt-2 text-sm flex items-start p-2 rounded-md border ${isChecked ? 'bg-blue-50 border-blue-100 text-blue-700' : 'bg-yellow-100/70 border-yellow-200 text-yellow-800'}`}>
                                      <AlertCircle className="w-4 h-4 mr-1.5 flex-shrink-0 mt-0.5" />
                                      <span className="leading-snug">{item.hint}</span>
                                    </div>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
            </div>
          </main>

          {/* 右下のアクションボタン */}
          <div className="fixed bottom-6 right-6 z-40 flex flex-col gap-3 print:hidden">
            <button onClick={handlePrint} className="flex items-center justify-center bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-full shadow-xl transform transition-transform active:scale-95 focus:outline-none">
              <Printer className="w-5 h-5 mr-2" />
              印刷する
            </button>
            <button onClick={handleCopy} className="flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full shadow-xl transform transition-transform active:scale-95 focus:outline-none">
              <Copy className="w-5 h-5 mr-2" />
              結果をコピー
            </button>
          </div>

          {/* 印刷用レイアウト */}
          <div className="hidden print:block text-black max-w-4xl mx-auto w-full p-2">
            <div className="border-b-2 border-black pb-3 mb-6 flex justify-between items-end">
              <h1 className="text-2xl font-bold flex items-center">
                <CheckSquare className="mr-2 w-8 h-8" />
                シューリーズ 見積もり漏れチェック結果
              </h1>
              <p className="text-sm font-medium">
                出力日時: {new Date().toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}
              </p>
            </div>

            <div className="mb-6 border-2 border-gray-600 rounded-lg p-3 grid grid-cols-1 sm:grid-cols-3 gap-2 text-sm print-avoid-break">
              <div><span className="font-bold">受付番号:</span> {reportMeta.受付番号 || "未入力"}</div>
              <div><span className="font-bold">車両情報:</span> {reportMeta.車両情報 || "未入力"}</div>
              <div><span className="font-bold">担当者:</span> {reportMeta.担当者 || "未入力"}</div>
            </div>
            
            {selectedAreas.length === 0 ? (
              <p className="text-center mt-10 font-bold text-gray-500">選択された部位がありません。</p>
            ) : (
              <div className="space-y-6">
                {selectedAreas.map((area) => {
                  const dataObj = area.areaKey === '共通項目' ? commonItems : partsData[area.areaKey];
                  const items = dataObj?.items || [];
                  const checkedCount = items.filter(item => checkedItems[`${area.label}::${item.name}`]).length;
                  
                  return (
                    <div key={area.label} className="print-avoid-break border-2 border-gray-600 rounded-lg overflow-hidden">
                      <div className="bg-gray-100 border-b-2 border-gray-600 p-2 px-4 flex justify-between items-center">
                        <h2 className="text-lg font-bold">{area.label}</h2>
                        <span className="text-sm font-bold">
                          {areaPatterns[area.label] || "未選択"} / チェック済: {checkedCount} / {items.length} 項目
                        </span>
                      </div>
                      <div className="p-4 grid grid-cols-2 gap-y-3 gap-x-6">
                        {items.map((item, idx) => {
                          const itemKey = `${area.label}::${item.name}`;
                          const isChecked = !!checkedItems[itemKey];
                          
                          return (
                            <div key={idx} className="flex items-start">
                              <div className={`w-5 h-5 border-2 border-black flex-shrink-0 flex items-center justify-center mr-2 mt-0.5 ${isChecked ? 'bg-black text-white' : 'bg-white'}`}>
                                {isChecked && <Check className="w-4 h-4 stroke-[4]" />}
                              </div>
                              <div className="flex-1 leading-snug">
                                <span className={`text-sm ${isChecked ? 'font-black' : 'text-gray-700'}`}>
                                  {item.name}
                                </span>
                                {item.isKeyPoint && !isChecked && (
                                  <span className="ml-2 text-[10px] border border-black px-1 font-bold inline-block whitespace-nowrap bg-gray-100">
                                    未確認
                                  </span>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* リセット確認モーダル */}
          {showConfirm && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 animate-fade-in print:hidden">
              <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full">
                <h3 className="text-lg font-bold text-gray-800 mb-3 border-b pb-2">確認</h3>
                <p className="text-gray-600 mb-6 text-sm">すべてのチェック状態と部位選択をリセットしますか？</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowConfirm(false)} className="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">キャンセル</button>
                  <button onClick={executeReset} className="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors shadow-sm">リセットする</button>
                </div>
              </div>
            </div>
          )}

          {/* トースト通知 */}
          {toastMessage && (
            <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-lg shadow-2xl z-50 flex items-center text-sm font-medium animate-fade-in-up print:hidden">
              <Info className="w-5 h-5 mr-2 text-blue-400" />
              {toastMessage}
            </div>
          )}
        </div>
      );
    }

    // --- Reactの描画実行 ---
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
